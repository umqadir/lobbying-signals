name: Refresh Data

on:
  schedule:
    # Run daily at 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:
    # Allow manual trigger
    inputs:
      rules_batch_size:
        description: 'Max activities to classify with deterministic rules'
        required: false
        default: '2000000'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: refresh-data
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt

      - name: Install dependencies
        run: |
          uv venv --python 3.12
          uv pip install --python .venv/bin/python -r requirements.txt

      - name: Ensure data release exists
        run: |
          gh release view data || gh release create data --title "Data Storage" --notes "SQLite database storage for the lobbying signals dashboard"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download database from release (if present)
        run: |
          set -euo pipefail
          mkdir -p data
          if gh release view data --json assets -q '.assets[].name' | grep -qx 'filings.db'; then
            gh release download data --pattern 'filings.db' -D data/
          else
            echo "No existing database asset, starting fresh"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize database if needed
        run: |
          if [ ! -f data/filings.db ]; then
            echo "Creating fresh database..."
            uv run python -c "from db import init_db; init_db()"
          fi

      - name: Run refresh
        run: |
          uv run python 07_refresh.py \
            --rules-batch-size ${{ github.event.inputs.rules_batch_size || '2000000' }}
        env:
          LDA_API_KEY: ${{ secrets.LDA_API_KEY }}

      - name: Upload database to release
        run: |
          gh release upload data data/filings.db --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit JSON exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "Update data exports [skip ci]"
          git push
